
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">Smart Task Manager</div>
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Register to manage your tasks securely.</p>

        <form id="registerForm" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control form-control-lg" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control form-control-lg" placeholder="Enter email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="Create password" required>
            </div>
            <button class="btn btn-success btn-lg w-100">Register</button>
        </form>

        <div id="message" class="mt-3"></div>

        <p class="auth-link mt-4">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const response = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: document.getElementById("username").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    const data = await response.json().catch(() => ({}));

    if (response.ok) {
        window.location.href = "/login";
    } else {
        document.getElementById("message").innerHTML =
            `<div class="alert alert-danger">${data.message || "Registration failed"}</div>`;
    }
});
</script>
</body>
</html>
