
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">Smart Task Manager</div>
        <h2 class="auth-title">Login</h2>
        <p class="auth-subtitle">Welcome back. Please sign in to continue.</p>

        <form id="loginForm" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control form-control-lg" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="Enter your password" required>
            </div>
            <button class="btn btn-primary btn-lg w-100">Login</button>
        </form>

        <div id="message" class="mt-3"></div>

        <p class="auth-link mt-4">
            Don't have an account? <a href="/register">Register</a>
        </p>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    const data = await response.json().catch(() => ({}));

    if (response.ok) {
        localStorage.setItem("username", data.username || "");
        window.location.href = "/dashboard";
    } else {
        document.getElementById("message").innerHTML =
            `<div class="alert alert-danger">${data.message || "Login failed"}</div>`;
    }
});
</script>
</body>
</html>
